name: auto-build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "opennow-stable/**"
      - "opennow-native-streamer/**"
      - ".github/workflows/auto-build.yml"
  push:
    branches:
      - main
      - dev
    paths:
      - "opennow-stable/**"
      - "opennow-native-streamer/**"
      - ".github/workflows/auto-build.yml"

concurrency:
  group: auto-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows
            os: blacksmith-4vcpu-windows-2025
            builder_args: "--win nsis portable"
          - label: macos-x64
            os: macos-latest
            builder_args: "--mac dmg zip --x64"
          - label: macos-arm64
            os: macos-latest
            builder_args: "--mac dmg zip --arm64"
          - label: linux-x64
            os: blacksmith-4vcpu-ubuntu-2404
            builder_args: "--linux AppImage deb --x64"
          - label: linux-arm64
            os: blacksmith-4vcpu-ubuntu-2404-arm
            builder_args: "--linux AppImage deb --arm64"

    defaults:
      run:
        working-directory: opennow-stable

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      npm_config_audit: "false"
      npm_config_fund: "false"
      # Use system fpm on arm64 (no prebuilt binaries available)
      USE_SYSTEM_FPM: ${{ matrix.label == 'linux-arm64' && 'true' || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache/electron
            ${{ github.workspace }}/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            fakeroot \
            libglib2.0-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgtk-4-dev \
            libudev-dev \
            pkg-config \
            rpm \
            xvfb \
            xdotool \
            gstreamer1.0-nice

      - name: Install macOS native streamer dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew update
          brew install pkg-config glib gstreamer gst-plugins-base gst-plugins-bad gtk4
          HOMEBREW_PREFIX="$(brew --prefix)"
          {
            echo "PKG_CONFIG_PATH=$HOMEBREW_PREFIX/lib/pkgconfig:$HOMEBREW_PREFIX/opt/glib/lib/pkgconfig:$HOMEBREW_PREFIX/opt/gstreamer/lib/pkgconfig:$HOMEBREW_PREFIX/opt/gst-plugins-base/lib/pkgconfig:$HOMEBREW_PREFIX/opt/gst-plugins-bad/lib/pkgconfig:$HOMEBREW_PREFIX/opt/gtk4/lib/pkgconfig"
            echo "PATH=$HOMEBREW_PREFIX/bin:$HOMEBREW_PREFIX/sbin:$PATH"
          } >> "$GITHUB_ENV"

      - name: Install Windows native streamer dependencies
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install -y gstreamer gstreamer-devel pkgconfiglite
          $gtkApiUrl = "https://api.github.com/repos/wingtk/gvsbuild/releases/latest"
          $gtkAsset = (Invoke-RestMethod -Uri $gtkApiUrl -Headers @{ "User-Agent" = "OpenNOW-CI" }).assets |
            Where-Object { $_.name -match '^GTK4_Gvsbuild_.*_x64\.zip$' } |
            Select-Object -First 1
          if (-not $gtkAsset) {
            throw "Unable to locate latest GTK4 gvsbuild x64 asset"
          }
          $gtkZip = Join-Path $env:RUNNER_TEMP $gtkAsset.name
          $gtkRoot = "C:\gtk"
          Invoke-WebRequest -Uri $gtkAsset.browser_download_url -OutFile $gtkZip
          if (Test-Path $gtkRoot) {
            Remove-Item -Recurse -Force $gtkRoot
          }
          Expand-Archive -Path $gtkZip -DestinationPath $gtkRoot
          $candidateRoots = @(
            "C:\Program Files\gstreamer\1.0\msvc_x86_64",
            "C:\gstreamer\1.0\msvc_x86_64"
          )
          $gstRoot = $candidateRoots | Where-Object { Test-Path (Join-Path $_ "bin") } | Select-Object -First 1
          if (-not $gstRoot) {
            throw "Unable to locate GStreamer installation. Checked: $($candidateRoots -join ', ')"
          }
          $gtkPkgConfig = Join-Path $gtkRoot "lib\pkgconfig"
          if (-not (Test-Path $gtkPkgConfig)) {
            throw "Unable to locate GTK4 pkg-config files at $gtkPkgConfig"
          }
          "GSTREAMER_1_0_ROOT_MSVC_X86_64=$gstRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "PKG_CONFIG_PATH=$gtkPkgConfig;$gstRoot\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "PKG_CONFIG=$env:ChocolateyInstall\bin\pkg-config.exe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "LIB=$gtkRoot\lib" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "INCLUDE=$gtkRoot\include" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "PATH=$env:ChocolateyInstall\bin;$gtkRoot\bin;$gstRoot\bin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install FPM for arm64 deb builds
        if: matrix.label == 'linux-arm64'
        run: sudo apt-get install -y ruby ruby-dev build-essential && sudo gem install fpm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run native streamer tests
        working-directory: .
        run: cargo test --manifest-path opennow-native-streamer/Cargo.toml

      - name: Build native streamer binary
        working-directory: .
        run: cargo build --manifest-path opennow-native-streamer/Cargo.toml

      - name: Build app bundles
        run: npm run build

      - name: Run native streamer Electron end-to-end check
        if: matrix.label == 'linux-x64'
        run: xvfb-run -a npm run native-streamer:e2e

      - name: Package installers
        run: npx electron-builder --publish never ${{ matrix.builder_args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opennow-stable-${{ matrix.label }}
          path: |
            opennow-stable/dist-release/*.exe
            opennow-stable/dist-release/*.dmg
            opennow-stable/dist-release/*.zip
            opennow-stable/dist-release/*.AppImage
            opennow-stable/dist-release/*.deb
          if-no-files-found: error
